services:
  web:
    build: 
      context: .
      target: production
    environment:
      PORT: 3000
      MONGO_URI: mongodb://db:27017/docker-challenge
      JWT_SECRET: "my_super_secret_key_for_dev"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  compose-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  mongo-data: # ההצהרה הגלובלית שפתרה את השגיאה!