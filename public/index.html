<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management Control Center</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard-layout">
      <aside class="sidebar">
        <h2>Engine Ops</h2>
        <div class="system-card">
          <h3>Server Health</h3>
          <button id="checkHealthBtn" class="btn-secondary">
            Run API Diagnostics
          </button>
          <div id="healthBadge" class="badge">Status Unknown</div>
          <pre id="healthResponse">Diagnostics clear...</pre>
        </div>
      </aside>

      <main class="main-content">
        <header class="workspace-header">
          <h1>User Management Dashboard</h1>
          <p>
            Manage and audit your persistent live MongoDB collection records
            securely.
          </p>
        </header>

        <div class="workspace-grid">
          <section class="card form-card">
            <h3>Register New User Profile</h3>
            <form id="createUserForm">
              <div class="form-group">
                <label for="usernameInput">Username</label>
                <input
                  type="text"
                  id="usernameInput"
                  required
                  placeholder="e.g., idan_asherov"
                />
              </div>
              <div class="form-group">
                <label for="emailInput">Email Address</label>
                <input
                  type="email"
                  id="emailInput"
                  required
                  placeholder="name@domain.com"
                />
              </div>
              <button type="submit" class="btn-primary">
                Generate User Account
              </button>
            </form>
            <div id="formFeedback" class="feedback-message"></div>
          </section>

          <section class="card list-card">
            <div class="list-header">
              <h3>Active MongoDB Collections</h3>
              <button id="refreshUsersBtn" class="btn-refresh">
                🔄 Refresh Directory
              </button>
            </div>
            <div class="users-table-wrapper">
              <table class="users-table">
                <thead>
                  <tr>
                    <th>Username</th>
                    <th>Email Signature</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="usersTableBody">
                  <tr>
                    <td colspan="3" class="table-empty">
                      Click Refresh Directory to fetch accounts...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script src="api.js"></script>
  </body>
</html>
