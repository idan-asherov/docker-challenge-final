<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>User Management Hub 🧑🏽‍💻</h1>
            <p>Live Full-Stack Containerized Application</p>
        </header>

        <main class="dashboard-grid">
            <section class="card form-card">
                <h2>Add New Profile</h2>
                <form id="userForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="john@example.com">
                    </div>
                    <button type="submit" class="btn-primary">Register User</button>
                </form>
                <div id="formMessage" class="message"></div>
            </section>

            <section class="card list-card">
                <h2>Active Registries</h2>
                <div class="loader" id="loader">Fetching data profiles...</div>
                <ul id="userList" class="user-list"></ul>
            </section>
        </main>
    </div>
    <script src="api.js"></script>
</body>
</html>
